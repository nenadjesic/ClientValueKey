version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000" 
    environment:
      - DATABASE_URL=mysql+pymysql://root:1234#ReWq@db-mysql:3306/dbtest
    depends_on:
      db-mysql:
        condition: service_healthy
    
  db-mysql:
    image: mysql:latest
    container_name: "test-mysql-db"
    environment:
      MYSQL_ROOT_PASSWORD: "1234#ReWq"
      MYSQL_DATABASE: "dbtest"
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p1234#ReWq"]
      interval: 5s
      timeout: 5s
      retries: 5
